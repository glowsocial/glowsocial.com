name: Generate Blog Posts

on:
  # Manual-only helper. Real content work should happen locally, then be
  # committed and pushed with normal git.
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of posts to generate'
        required: false
        default: '5'
      keyword:
        description: 'Optional: single specific keyword to generate'
        required: false
        default: ''

jobs:
  generate-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '5' }}"
          KEYWORD="${{ github.event.inputs.keyword }}"

          if [ -n "$KEYWORD" ]; then
            node scripts/generate-blog-posts.js --count 1 --keyword "$KEYWORD"
          else
            node scripts/generate-blog-posts.js --count $COUNT
          fi

      - name: Check for new posts
        id: check_changes
        run: |
          if git diff --quiet HEAD -- content/blog/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            NEW_COUNT=$(git status --short content/blog/ | grep "^?" | wc -l | tr -d ' ')
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "new_count=$NEW_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Manual workflow notice
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          echo "Blog post generation created content, but this repo now uses a local git workflow for SEO/AEO work."
          echo "Run the same command locally, review the diff, commit, and push your branch yourself."

      - name: Summary
        run: |
          if [ "${{ steps.check_changes.outputs.has_changes }}" == "true" ]; then
            echo "ℹ️ Generated ${{ steps.check_changes.outputs.new_count }} new post(s), but did not commit or push them."
          else
            echo "ℹ️ No new posts — all keywords in the bank already have posts"
          fi
