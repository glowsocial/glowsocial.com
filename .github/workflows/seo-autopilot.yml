name: SEO Autopilot

on:
  # Manual-only helper. Use local edits + manual PRs for real SEO/AEO changes.
  workflow_dispatch:

jobs:
  seo-work:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run SEO autopilot
        run: npm run seo:work

      - name: Check for tracked changes
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Manual workflow notice
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          echo "SEO autopilot produced changes, but this repo now uses a manual Git workflow for SEO/AEO work."
          echo "Run the same command locally, review the diff, push your own branch, and open a PR manually."

      - name: No changes summary
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No SEO autopilot changes found."
