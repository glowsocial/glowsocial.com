name: SEO Intel Scout

on:
  # Scout the curated SEO/AEO source list once per week and open a PR with one
  # new experiment brief when a useful idea appears.
  schedule:
    - cron: '30 15 * * 3'

  workflow_dispatch:

jobs:
  seo-intel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scout SEO/AEO sources
        run: npm run seo:intel -- --fetch-sources --limit 30

      - name: Check for tracked changes
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open SEO intel pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/seo-intel
          delete-branch: true
          title: "SEO intel: add new experiment brief"
          commit-message: "seo: add intel experiment"
          body: |
            Automated SEO/AEO intel scout.

            This PR adds one experiment brief from `npm run seo:intel -- --fetch-sources --limit 30` and updates `seo-opportunities.json`.
